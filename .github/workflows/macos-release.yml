name: macOS Build and Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
      - "mac-v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release binary
        run: |
          chmod +x build.sh
          ./build.sh release
          ls -la dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: XYZMonitor-binary
          path: dist/XYZMonitor

      - name: Build DMG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          chmod +x create-dmg.sh
          VERSION="${GITHUB_REF_NAME}"
          ./create-dmg.sh dist/XYZMonitor "XYZMonitor-${VERSION}.dmg"

      - name: Upload DMG artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: XYZMonitor-dmg
          path: XYZMonitor-*.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'mac-v') }}
          files: |
            dist/XYZMonitor
            XYZMonitor-*.dmg
