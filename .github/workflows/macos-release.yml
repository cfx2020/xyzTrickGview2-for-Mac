name: macOS Build and Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
      - "mac-v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release binary
        run: |
          chmod +x build.sh
          ./build.sh release
          ls -la dist

      - name: Build DMG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          chmod +x create-dmg.sh
          VERSION="${GITHUB_REF_NAME}"
          ./create-dmg.sh dist/XYZMonitor "XYZMonitor-${VERSION}.dmg"

      - name: Upload DMG artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: XYZMonitor-dmg
          path: XYZMonitor-*.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 版本 ${{ github.ref_name }}
          prerelease: ${{ startsWith(github.ref_name, 'mac-v') }}
          body: |
            这是 xyzTrickGview2 for Mac 的发布版本。

            说明：
            - 仅提供 DMG 安装包
            - 下载后双击打开，将应用拖入“应用程序”即可完成安装
            - 如果你使用的是预发布版本，请先确认功能是否满足你的需求
          files: |
            XYZMonitor-*.dmg
